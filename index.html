<!DOCTYPE html>
<html lang="en-IE">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
      name="description"
      content="Napkin Audio AI Studio, a local-first AI audio craft studio for scripts, performance, sound design, QC, and export packages."
    >
    <title>Napkin Audio — AI Studio</title>
    <script>
      (function () {
        try {
          var saved = window.localStorage.getItem("napkin-audio-ai-studio-theme");
          var theme = saved === "light" || saved === "dark"
            ? saved
            : (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
          document.documentElement.dataset.theme = theme;
        } catch (error) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
