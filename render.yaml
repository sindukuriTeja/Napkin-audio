services:
  - type: web
    name: napkin-audio-provider-proxy
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run server
    envVars:
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_DEFAULT_VOICE_ID
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        value: llama3
